{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>{% block title %}Barbería{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #f4f6f9;
}

.navbar {
    background: #000;
}

.navbar a {
    color: white !important;
}

.card {
    border-radius: 15px;
}
</style>

{% block extra_css %}{% endblock %}
</head>

<body>

<nav class="navbar navbar-expand-lg px-4">
    <a class="navbar-brand text-white" href="/">💈 Barbería</a>

    <div class="ms-auto">
        <a href="/" class="btn btn-outline-light btn-sm">Dashboard</a>
        <a href="/agenda/" class="btn btn-outline-light btn-sm">Agenda</a>
        <a href="/calendario/" class="btn btn-outline-light btn-sm">Calendario</a>
        <a href="/panel-barbero/" class="btn btn-outline-light btn-sm">Barbero</a>
        <a href="/accounts/logout/" class="btn btn-danger btn-sm">Salir</a>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
