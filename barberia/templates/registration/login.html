{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            background: #0f172a;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .box {
            background: #020617;
            padding: 35px;
            border-radius: 15px;
            width: 320px;
            border: 1px solid #1e293b;
            text-align: center;
        }

        /* 🔥 LOGO CON EFECTO BLANCO/FLUORESCENTE */
        .logo {
            width: 90px;
            margin-bottom: 15px;
            border-radius: 50%;
            padding: 10px;
            background: white;

            /* EFECTO GLOW */
            box-shadow:
                0 0 10px #ffffff,
                0 0 20px #38bdf8,
                0 0 40px #38bdf8;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: none;
            background: #1e293b;
            color: white;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #38bdf8;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: black;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #0ea5e9;
        }
    </style>
</head>
<body>

<div class="box">

    <!-- 🔥 LOGO -->
    <img src="{% static 'img/barber_icon.png' %}" class="logo">

    <h2>Iniciar sesión</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Entrar</button>
    </form>

    {% if form.errors %}
        <p style="color:red;">Usuario o contraseña incorrectos</p>
    {% endif %}

</div>

</body>
</html>
