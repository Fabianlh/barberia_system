<!DOCTYPE html>
<html>
<head>

<title>Panel Barbero</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">

<h2 class="mb-4">Citas de Hoy 💈</h2>

<table class="table table-striped">

<thead>

<tr>
<th>Cliente</th>
<th>Servicio</th>
<th>Hora</th>
<th>Estado</th>
<th>Acción</th>
</tr>

</thead>

<tbody>

{% for cita in citas %}

<tr>

<td>{{ cita.cliente.nombre }}</td>

<td>{{ cita.servicio.nombre }}</td>

<td>{{ cita.hora }}</td>

<td>{{ cita.estado }}</td>

<td>

{% if cita.estado != "atendida" %}

<a href="{% url 'atender_cita' cita.id %}" class="btn btn-success btn-sm">

Atender

</a>

{% else %}

<span class="badge bg-success">Finalizada</span>

{% endif %}

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</body>
</html>
