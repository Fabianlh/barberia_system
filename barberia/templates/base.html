<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Barbería</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        .navbar {
            background: #020617;
            padding: 15px 25px;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid #1e293b;
        }

        .layout {
            display: flex;
        }

        .sidebar {
            width: 230px;
            background: #020617;
            padding: 20px;
            min-height: 100vh;
            border-right: 1px solid #1e293b;
        }

        .sidebar a {
            display: block;
            padding: 10px;
            color: #cbd5f5;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background: #1e293b;
            color: #38bdf8;
        }

        .content {
            flex: 1;
            padding: 30px;
        }

        .card {
            background: #020617;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #1e293b;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .title {
            font-size: 18px;
            color: #94a3b8;
        }

        .value {
            font-size: 28px;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table th, table td {
            padding: 10px;
            border-bottom: 1px solid #1e293b;
        }

        table th {
            color: #94a3b8;
            text-align: left;
        }

        button {
            background: #38bdf8;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
        }

        input, select {
            padding: 10px;
            border-radius: 8px;
            border: none;
            width: 100%;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="navbar">
    💈 Barbería System
</div>

<div class="layout">

    <div class="sidebar">
        <a href="/">🏠 Dashboard</a>
        <a href="/agenda/">📅 Agenda</a>
        <a href="/reservar/">➕ Reservar</a>
        <a href="/calendario/">🗓 Calendario</a>
        <form action="/accounts/logout/" method="post">
    {% csrf_token %}
    <button type="submit">🚪 Salir</button>
</form>
    </div>

    <div class="content">
        {% block content %}
        {% endblock %}
    </div>

</div>

</body>
</html>
