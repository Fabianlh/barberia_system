{% extends 'base.html' %}

{% block content %}
<h1>Agenda</h1>

<table border="1" cellpadding="10">
    <tr>
        <th>Fecha</th>
        <th>Hora</th>
        <th>Cliente</th>
        <th>Servicio</th>
        <th>Estado</th>
    </tr>

    {% for cita in citas %}
    <tr>
        <td>{{ cita.fecha }}</td>
        <td>{{ cita.hora }}</td>
        <td>{{ cita.cliente.nombre }}</td>
        <td>{{ cita.servicio.nombre }}</td>
        <td>{{ cita.estado }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="5">No hay citas</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
