<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Iniciar sesión</h2>

<form method="post">
    {% csrf_token %}

    <label>Usuario</label>
    <input type="text" name="username">

    <label>Contraseña</label>
    <input type="password" name="password">

    <button type="submit">Entrar</button>
</form>

</body>
</html>
