<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login Barbería</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: #111;
}

.login-box{
    max-width: 400px;
    margin: 120px auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

.title{
    text-align:center;
    margin-bottom:20px;
}
</style>

</head>

<body>

<div class="login-box">

<h3 class="title">💈 Barbería Login</h3>

<form method="post">
{% csrf_token %}

<div class="mb-3">
<label>Usuario</label>
<input type="text" name="username" class="form-control">
</div>

<div class="mb-3">
<label>Contraseña</label>
<input type="password" name="password" class="form-control">
</div>

<button type="submit" class="btn btn-dark w-100">
Iniciar sesión
</button>

</form>

</div>

</body>
</html><!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Iniciar sesión</h2>

<form method="post">
    {% csrf_token %}

    <label>Usuario</label>
    <input type="text" name="username">

    <label>Contraseña</label>
    <input type="password" name="password">

    <button type="submit">Entrar</button>
</form>

</body>
</html>
