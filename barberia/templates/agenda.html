<!DOCTYPE html>
<html>
<head>
    <title>Agenda Barbería</title>

    <style>

    body{
        font-family: Arial;
        background:#f5f5f5;
        padding:40px;
    }

    h1{
        text-align:center;
    }

    table{
        width:100%;
        border-collapse:collapse;
        background:white;
    }

    th,td{
        padding:12px;
        border:1px solid #ddd;
        text-align:center;
    }

    th{
        background:black;
        color:white;
    }

    tr:hover{
        background:#f1f1f1;
    }

    </style>

</head>

<body>

<h1>Agenda de Citas</h1>

<table>

<tr>
<th>Fecha</th>
<th>Hora</th>
<th>Cliente</th>
<th>Servicio</th>
<th>Barbero</th>
<th>Estado</th>
</tr>

{% for cita in citas %}

<tr>
<td>{{ cita.fecha }}</td>
<td>{{ cita.hora }}</td>
<td>{{ cita.cliente }}</td>
<td>{{ cita.servicio }}</td>
<td>{{ cita.barbero }}</td>
<td>{{ cita.estado }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
