<!DOCTYPE html>
<html>
<head>
    <title>Calendario de Citas</title>

    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

</head>
<body>

<h2>Calendario de Citas 💈</h2>

<div id="calendar"></div>

<script>

document.addEventListener('DOMContentLoaded', function() {

    var calendarEl = document.getElementById('calendar');

    var calendar = new FullCalendar.Calendar(calendarEl, {

        initialView: 'dayGridMonth',

        locale: 'es',

        events: '/citas-json/',

        eventDidMount: function(info){

            if(info.event.extendedProps.estado == "reservada"){
                info.el.style.backgroundColor = "#3498db";
            }

            if(info.event.extendedProps.estado == "atendida"){
                info.el.style.backgroundColor = "#2ecc71";
            }

            if(info.event.extendedProps.estado == "cancelada"){
                info.el.style.backgroundColor = "#e74c3c";
            }

        }

    });

    calendar.render();

});

</script>

</body>
</html>
<script>

document.addEventListener('DOMContentLoaded', function() {

    var calendarEl = document.getElementById('calendar');

    var calendar = new FullCalendar.Calendar(calendarEl, {

        initialView: 'dayGridMonth',
        locale: 'es',
        events: '/citas-json/',

        eventClick: function(info) {

            var id = info.event.id

            window.location.href = "/atender-cita/" + id

        }

    });

    calendar.render();

});

</script>
